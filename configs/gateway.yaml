server:
  port: 8080
  read_timeout_seconds: 10
  read_header_timeout_seconds: 5
  write_timeout_seconds: 0          # 0 disables write deadline (required for SSE streaming — ADR-0008)
  idle_timeout_seconds: 60
  max_header_bytes: 1048576

azure_openai:
  endpoint: ${AZURE_OPENAI_ENDPOINT}
  api_key: ${kv:AZURE-OPENAI-API-KEY}
  api_version: "2025-01-01-preview"
  request_timeout_seconds: 60

# azure_content_safety:             # Uncomment to enable Tier 3 cloud guardrails
#   endpoint: ${AZURE_CS_ENDPOINT}
#   api_key: ${AZURE_CS_API_KEY}
#   api_version: "2024-09-01"
#   prompt_shield_timeout_ms: 1500
#   content_safety_timeout_ms: 1500

database:
  url: ${kv:DATABASE-URL}
  max_conns: 20
  min_conns: 2
  # 64-char lowercase hex string (32 bytes) for AES-256-GCM encryption of proxy
  # target credentials. Generate with: openssl rand -hex 32
  # Never commit the real value; use the environment variable reference.
  encryption_key_hex: ${kv:DB-ENCRYPTION-KEY}

logging:
  level: info                       # debug | info | warn | error
  format: json                      # json | text
  raw_prompt_logging: false         # MUST be false in any non-dev environment

models:
  # Deployment names match exactly the names created in Azure AI Foundry.
  # Endpoint: https://danie-mc4ryviy-westeurope.cognitiveservices.azure.com
  - public_name: gpt-4.1
    deployment: gpt-4.1
    provider: azure
    cost_input_per_1k_brl: 0.0115   # ~$2.00/1M input at R$5.75/USD — adjust for prod
    cost_output_per_1k_brl: 0.0460  # ~$8.00/1M output at R$5.75/USD — adjust for prod

  - public_name: gpt-4.1-mini
    deployment: gpt-4.1-mini
    provider: azure
    cost_input_per_1k_brl: 0.0023   # ~$0.40/1M input at R$5.75/USD — adjust for prod
    cost_output_per_1k_brl: 0.0092  # ~$1.60/1M output at R$5.75/USD — adjust for prod

  - public_name: gpt-4.1-nano
    deployment: gpt-4.1-nano
    provider: azure
    cost_input_per_1k_brl: 0.0006   # ~$0.10/1M input at R$5.75/USD — adjust for prod
    cost_output_per_1k_brl: 0.0023  # ~$0.40/1M output at R$5.75/USD — adjust for prod

