server:
  port: 8080
  read_timeout_seconds: 10
  read_header_timeout_seconds: 5
  write_timeout_seconds: 0          # 0 disables write deadline (required for SSE streaming — ADR-0008)
  idle_timeout_seconds: 60
  max_header_bytes: 1048576

azure_openai:
  endpoint: ${AZURE_OPENAI_ENDPOINT}
  api_key: ${AZURE_OPENAI_API_KEY}
  api_version: "2024-10-21"
  request_timeout_seconds: 60

azure_content_safety:               # Optional: remove section to disable; Tier 3 falls back to local heuristics
  endpoint: ${AZURE_CS_ENDPOINT}
  api_key: ${AZURE_CS_API_KEY}
  api_version: "2024-09-01"
  prompt_shield_timeout_ms: 1500
  content_safety_timeout_ms: 1500

database:
  url: ${DATABASE_URL}
  max_conns: 20
  min_conns: 2

logging:
  level: info                       # debug | info | warn | error
  format: json                      # json | text
  raw_prompt_logging: false         # MUST be false in any non-dev environment

models:
  - public_name: gpt-4.1-mini
    deployment: gpt-4.1-mini-deploy
    provider: azure
    cost_input_per_1k_brl: 0.0020   # ~$0.40/1M input tokens at R$5/USD (fictional — adjust for prod)
    cost_output_per_1k_brl: 0.0080  # ~$1.60/1M output tokens at R$5/USD (fictional — adjust for prod)
  - public_name: gpt-4.1-nano
    deployment: gpt-4.1-nano-deploy
    provider: azure
    cost_input_per_1k_brl: 0.0005   # ~$0.10/1M input tokens at R$5/USD (fictional — adjust for prod)
    cost_output_per_1k_brl: 0.0020  # ~$0.40/1M output tokens at R$5/USD (fictional — adjust for prod)

applications:
  - name: AppLeve
    key_prefix: gwk_leve
    key_hash: "504758522b63dcd54a9bae3e029d9b0bd4de45934857f04ccd3c1006f088fae4"
    tier: tier_1
    allowed_models: [gpt-4.1-nano]
    streaming_allowed: true
    max_rpm: 600
    max_tpm: 500000
    monthly_budget_brl: 100.00

  - name: AppMedio
    key_prefix: gwk_med
    key_hash: "f646d29a7cd112f877555c7f41676a3b3ebd234304cdc379f28821b3af118195"
    tier: tier_2
    allowed_models: [gpt-4.1-mini, gpt-4.1-nano]
    streaming_allowed: true
    max_rpm: 300
    max_tpm: 250000
    monthly_budget_brl: 500.00

  - name: AppSensivel
    key_prefix: gwk_sens
    key_hash: "16c642ab8d7640e709b129110b1df2d7d8bff6541ede8ef17ec264c3a0282795"
    tier: tier_3
    allowed_models: [gpt-4.1-mini]
    streaming_allowed: false
    max_rpm: 60
    max_tpm: 50000
    monthly_budget_brl: 1000.00
